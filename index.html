<!DOCTYPE html>
<html>
<head>
    <title>Professional Expense Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f6fb;
            padding:40px 20px;
            display:flex;
            justify-content:center;
        }

        .dashboard{
            width:100%;
            max-width:1100px;
        }

        h1{
            font-weight:600;
            margin-bottom:5px;
            color:#2c3e50;
        }

        .greeting{
            color:#7f8c8d;
            margin-bottom:25px;
            font-size:14px;
        }

        .top-cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            font-size:14px;
            color:#7f8c8d;
        }

        .card p{
            font-size:22px;
            font-weight:600;
            margin-top:8px;
        }

        .balance{color:#2c3e50;}
        .income{color:#27ae60;}
        .expense{color:#e74c3c;}

        .progress-bar{
            background:#ecf0f1;
            border-radius:20px;
            height:10px;
            margin-top:10px;
            overflow:hidden;
        }

        #progress{
            height:100%;
            width:0%;
            background:#e74c3c;
            transition:0.5s ease;
        }

        .main-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:25px;
        }

        .form-section, .chart-section{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        input, select{
            width:100%;
            padding:10px;
            margin-bottom:10px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:14px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:500;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#34495e;
        }

        ul{
            list-style:none;
            margin-top:15px;
            max-height:200px;
            overflow-y:auto;
        }

        li{
            display:flex;
            justify-content:space-between;
            padding:8px;
            border-bottom:1px solid #eee;
            font-size:14px;
        }

        .delete-btn{
            background:#e74c3c;
            border:none;
            color:white;
            padding:3px 8px;
            border-radius:5px;
            cursor:pointer;
        }

        canvas{
            margin-top:15px;
            height:250px !important;
        }

        .recent{
            margin-top:20px;
        }

        @media(max-width:768px){
            .main-grid{
                grid-template-columns:1fr;
            }
        }

    </style>
</head>

<body>

<div class="dashboard">

    <h1>💼 Expense Dashboard</h1>
    <p class="greeting">Good Evening 👋 Welcome back!</p>

    <div class="top-cards">
        <div class="card">
            <h3>Total Balance</h3>
            <p class="balance">₹ <span id="balance">0</span></p>
        </div>

        <div class="card">
            <h3>Total Income</h3>
            <p class="income">₹ <span id="income">0</span></p>
        </div>

        <div class="card">
            <h3>Total Expense</h3>
            <p class="expense">₹ <span id="expense">0</span></p>
        </div>

        <div class="card">
            <h3>Spending Ratio</h3>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
        </div>
    </div>

    <div class="main-grid">

        <div class="form-section">
            <h3>Add Transaction</h3>

            <input type="text" id="text" placeholder="Description">

            <input type="number" id="amount" placeholder="Amount (+income, -expense)">

            <select id="category">
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>

            <button onclick="addTransaction()">Add Transaction</button>

            <ul id="list"></ul>
        </div>

        <div class="chart-section">
            <h3>Financial Overview</h3>
            <canvas id="pieChart"></canvas>
            <canvas id="barChart"></canvas>

            <div class="recent card">
                <h3>Recent Activity</h3>
                <ul id="recent"></ul>
            </div>

        </div>

    </div>
</div>

<script>

let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let pieChart, barChart;

function updateLocalStorage(){
    localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addTransaction(){
    const text = document.getElementById('text').value;
    const amount = +document.getElementById('amount').value;
    const category = document.getElementById('category').value;

    if(text === '' || amount === 0){
        alert("Enter valid details");
        return;
    }

    transactions.push({
        id: Date.now(),
        text,
        amount,
        category,
        date: new Date().toLocaleDateString()
    });

    updateLocalStorage();
    displayTransactions();

    document.getElementById('text').value='';
    document.getElementById('amount').value='';
}

function deleteTransaction(id){
    transactions = transactions.filter(t => t.id !== id);
    updateLocalStorage();
    displayTransactions();
}

function displayTransactions(){

    const list = document.getElementById('list');
    const recent = document.getElementById('recent');
    list.innerHTML='';
    recent.innerHTML='';

    let income=0, expense=0;

    transactions.forEach(t=>{
        const li=document.createElement('li');
        li.innerHTML=`
            <div>
                <strong>${t.text}</strong><br>
                <small>${t.category} • ${t.date}</small>
            </div>
            <div>
                ₹${t.amount}
                <button class="delete-btn" onclick="deleteTransaction(${t.id})">x</button>
            </div>
        `;
        list.appendChild(li);

        if(t.amount>0) income+=t.amount;
        else expense+=t.amount;
    });

    transactions.slice(-3).reverse().forEach(t=>{
        const item=document.createElement('li');
        item.innerHTML=`${t.text} - ₹${t.amount}`;
        recent.appendChild(item);
    });

    document.getElementById('income').innerText=income;
    document.getElementById('expense').innerText=Math.abs(expense);
    document.getElementById('balance').innerText=income+expense;

    let total = income + Math.abs(expense);
    let ratio = total === 0 ? 0 : (Math.abs(expense)/total)*100;
    document.getElementById('progress').style.width = ratio + "%";

    updateCharts(income, Math.abs(expense));
}

function updateCharts(income, expense){

    if(pieChart) pieChart.destroy();
    if(barChart) barChart.destroy();

    pieChart=new Chart(document.getElementById('pieChart'),{
        type:'doughnut',
        data:{
            labels:['Income','Expense'],
            datasets:[{
                data:[income,expense],
                backgroundColor:['#27ae60','#e74c3c']
            }]
        },
        options:{responsive:true, maintainAspectRatio:false}
    });

    barChart=new Chart(document.getElementById('barChart'),{
        type:'bar',
        data:{
            labels:transactions.map(t=>t.text),
            datasets:[{
                label:'Amount',
                data:transactions.map(t=>t.amount),
                backgroundColor:transactions.map(t=>t.amount>0?'#27ae60':'#e74c3c')
            }]
        },
        options:{responsive:true, maintainAspectRatio:false}
    });
}

displayTransactions();

</script>

</body>
</html>
